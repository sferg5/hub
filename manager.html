<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<title>Motion Work · Manager View</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2318181b'/><circle cx='50' cy='50' r='26' fill='none' stroke='%2322c55e' stroke-width='7'/><circle cx='50' cy='50' r='6' fill='%2322c55e'/></svg>" />
<style>
  :root {
    --bg:#09090b; --panel:#18181b; --surface:#0d0d0f; --line:#27272a; --line2:#3f3f46;
    --text:#f4f4f5; --muted:#a1a1aa; --faint:#71717a; --accent:#22c55e; --accent-dim:rgba(34,197,94,0.13);
    --rose:#fb7185; --amber:#fbbf24;
    --font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased;padding:22px 16px 64px}
  .wrap{max-width:820px;margin:0 auto}
  a{color:inherit}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:8px}
  h1{font-size:24px;font-weight:700;letter-spacing:-.01em;margin:0}
  .roflag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--faint);margin-top:6px}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 15px;border-radius:10px;text-decoration:none;font-size:13.5px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--text);transition:border-color .14s ease}
  .btn:hover{border-color:var(--line2)}
  .btn.primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{background:#4ade80}
  .updated{font-size:11.5px;color:var(--faint);font-family:var(--mono)}
  section{margin-top:26px}
  h2{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-size:28px;font-weight:700;margin-top:4px}
  .stat .v.zero{color:var(--faint)}
  .stat.rose .v{color:var(--rose)} .stat.amber .v{color:var(--amber)} .stat.green .v{color:var(--accent)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:11px 15px;border-top:1px solid var(--line)}
  .row:first-child{border-top:none}
  .dot{width:8px;height:8px;border-radius:999px;flex-shrink:0}
  .row .name{font-size:14px;font-weight:500;min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .meta{font-size:11.5px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-shrink:0}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:5px;background:#27272a;color:var(--muted)}
  .due{font-size:11.5px;flex-shrink:0}
  .due.over{color:var(--rose)} .due.soon{color:var(--amber)} .due.calm{color:var(--faint)}
  .high{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--rose);background:rgba(251,113,133,.15);padding:2px 6px;border-radius:5px;font-weight:600}
  .empty{color:var(--faint);font-size:13px;font-style:italic;padding:16px 15px;text-align:center}
  /* week strip */
  .week{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .day{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px;min-height:76px}
  .day.today{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.05)}
  .day .dl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
  .day.today .dl{color:var(--accent)}
  .day .it{font-size:10.5px;line-height:1.35;color:var(--text);display:flex;gap:5px;align-items:flex-start;margin-top:3px}
  .day .it .h{color:var(--faint);flex-shrink:0}
  .day .none{font-size:10.5px;color:var(--faint);font-style:italic}
  /* checklist */
  .chk{display:flex;align-items:center;gap:10px;padding:9px 15px;border-top:1px solid var(--line)}
  .chk:first-child{border-top:none}
  .chk .box{width:16px;height:16px;border-radius:999px;border:2px solid var(--line2);flex-shrink:0;display:grid;place-items:center}
  .chk.done .box{border-color:var(--accent);background:var(--accent)}
  .chk .box svg{display:none} .chk.done .box svg{display:block}
  .chk .txt{font-size:13.5px}
  .chk.done .txt{color:var(--faint);text-decoration:line-through}
  .addbar{display:flex;gap:8px;padding:12px 15px;border-top:1px solid var(--line);background:var(--panel)}
  .addbar input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13.5px;outline:none;font-family:var(--font)}
  .addbar input:focus{border-color:var(--accent)}
  .addbar button{background:var(--accent);color:#0a0a0a;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .addbar button:disabled{opacity:.5;cursor:default}
  #msg{min-height:16px;margin-top:8px;font-size:12px;font-family:var(--mono);color:var(--muted);padding:0 15px}
  #msg.ok{color:var(--accent)} #msg.err{color:var(--rose)}
  .note{font-size:11.5px;color:var(--faint);margin-top:8px;line-height:1.5}
  .loading{text-align:center;color:var(--muted);padding:60px 0;font-size:14px}
  svg{flex-shrink:0}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="eyebrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5" fill="#22c55e"/></svg>
          Motion Design · UX
        </div>
        <h1>Manager view</h1>
        <div class="roflag">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          View-only — you can add checklist items and open the intake form
        </div>
      </div>
      <div class="btnrow">
        <a class="btn primary" href="https://hub-mospec.vercel.app/intake.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          Open intake form
        </a>
        <button class="btn" id="refreshBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Refresh
        </button>
        <span class="updated" id="updated"></span>
      </div>
    </header>

    <div id="content"><div class="loading">Loading…</div></div>
  </div>

<script>
(function () {
  "use strict";
  var SYNC_URL = "/api/data";
  var PREFIX = "motion-tracker:";
  var CHK_KEY = PREFIX + "dailyChecklist";
  var POLL_MS = 60000;

  var STATUS = {
    backlog:   { label: "Backlog",          dot: "#38bdf8" },
    discovery: { label: "Discovery",        dot: "#94a3b8" },
    wip:       { label: "Work in Progress", dot: "#a78bfa" },
    review:    { label: "In Review",        dot: "#fbbf24" },
    revisions: { label: "Revisions",        dot: "#fb923c" },
    delivered: { label: "Delivered",        dot: "#34d399" },
    onhold:    { label: "On Hold",          dot: "#71717a" },
  };
  var ACTIVE = ["discovery", "wip", "review", "revisions"];

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  function arr(v){ return Array.isArray(v) ? v : []; }
  function sumHours(entries){ return arr(entries).reduce(function(s,e){return s+(Number(e.hours)||0);},0); }
  function midnight(d){ var x=new Date(d); x.setHours(0,0,0,0); return x; }
  function mondayOf(d){ var x=midnight(d); var day=x.getDay(); x.setDate(x.getDate()+(day===0?-6:1-day)); return x; }
  function todayKey(){ var d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); } // matches dashboard format
  function mondayKey(m){ return m.getFullYear()+"-"+(m.getMonth()+1)+"-"+m.getDate(); }
  function daysUntil(dateStr){ if(!dateStr) return null; var dl=new Date(dateStr+"T00:00:00"); return Math.ceil((dl-midnight(new Date()))/86400000); }
  function dueLabel(dateStr, status){
    var d=daysUntil(dateStr);
    if(d===null) return null;
    if(status==="delivered") return null;
    if(d<0) return {cls:"over", text:Math.abs(d)+"d overdue"};
    if(d===0) return {cls:"over", text:"due today"};
    if(d===1) return {cls:"soon", text:"due tomorrow"};
    if(d<=7) return {cls:"soon", text:d+"d left"};
    return {cls:"calm", text:d+"d left"};
  }
  function fmtWhen(ts){ if(!ts) return ""; var d=new Date(ts); return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); }

  var msgEl, updatedEl;
  function setMsg(t,k){ if(msgEl){ msgEl.textContent=t||""; msgEl.className=k==="ok"?"ok":k==="err"?"err":""; } }

  async function getSnapshot(){
    var r = await fetch(SYNC_URL, { method:"GET", cache:"no-store" });
    if(!r.ok) throw new Error("HTTP "+r.status);
    var j = await r.json();
    if(!j || j.error || typeof j.data!=="object") throw new Error(j && j.error ? j.error : "bad-data");
    return j;
  }

  // The ONLY write this page performs: append one checklist item, via a safe
  // read-modify-write that never blanks the store.
  async function addChecklistItem(text){
    var snap;
    try { snap = await getSnapshot(); } catch(e){ return false; }
    if(!snap || typeof snap.data!=="object") return false;
    var items = arr(snap.data[CHK_KEY]);
    var item = { id: Date.now().toString(36)+Math.random().toString(36).slice(2,7), text: text.trim(), doneOn: null };
    snap.data[CHK_KEY] = items.concat([item]);   // dashboard appends to the end too
    snap.updatedAt = Date.now();
    try {
      var res = await fetch(SYNC_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(snap) });
      return res.ok;
    } catch(e){ return false; }
  }

  function urgency(p, today){
    var s=0;
    if(p.deadline){ var dl=new Date(p.deadline+"T00:00:00"); var days=(dl-today)/86400000; if(days<0)s+=1000+Math.abs(days)*5; else if(days<14)s+=(14-days)*30; }
    if(p.priority==="high")s+=200; else if(p.priority==="medium")s+=50;
    if(p.status==="wip"||p.status==="revisions")s+=100; else if(p.status==="review")s+=60; else if(p.status==="discovery")s+=30;
    return s;
  }

  function render(snap){
    var data = snap.data || {};
    var projects = arr(data[PREFIX+"projects"]);
    var completed = arr(data[PREFIX+"completed"]);
    var checklist = arr(data[CHK_KEY]);
    var weekPicks = data[PREFIX+"weekPicks"] || null;

    var today = midnight(new Date());
    var monday = mondayOf(today);
    var sunday = new Date(monday); sunday.setDate(monday.getDate()+6); sunday.setHours(23,59,59,999);

    // stats
    var activeNow = projects.filter(function(p){ return ACTIVE.indexOf(p.status)>=0; }).length;
    var overdue = projects.filter(function(p){ if(["delivered","backlog","onhold"].indexOf(p.status)>=0||!p.deadline) return false; return new Date(p.deadline+"T00:00:00")<today; }).length;
    var dueThisWeek = projects.filter(function(p){ if(["delivered","backlog","onhold"].indexOf(p.status)>=0||!p.deadline) return false; var dl=new Date(p.deadline+"T00:00:00"); return dl>=today && dl<=sunday; }).length;
    var hoursWeek = 0;
    projects.concat(completed).forEach(function(p){ arr(p.timeEntries).forEach(function(e){ if(!e.date) return; var d=new Date(e.date+"T12:00:00"); if(d>=monday && d<=sunday) hoursWeek+=Number(e.hours)||0; }); });
    hoursWeek = Math.round(hoursWeek*10)/10;

    var html = "";

    html += '<section><h2>At a glance</h2><div class="grid">';
    html += statCard("Active now", activeNow, activeNow?"green":"");
    html += statCard("Due this week", dueThisWeek, dueThisWeek?"amber":"");
    html += statCard("Overdue", overdue, overdue?"rose":"");
    html += statCard("Hours logged this wk", hoursWeek+"h", hoursWeek?"":"");
    html += '</div></section>';

    // this week plan
    html += '<section><h2>'+iconSvg("cal")+'This week</h2>';
    html += weekStrip(weekPicks, monday, projects.concat(completed));
    html += '</section>';

    // in motion
    var inMotion = projects.filter(function(p){ return ACTIVE.indexOf(p.status)>=0; }).sort(function(a,b){ return urgency(b,today)-urgency(a,today); });
    html += '<section><h2>'+iconSvg("play")+'In motion ('+inMotion.length+')</h2>';
    if(!inMotion.length){ html += '<div class="card"><div class="empty">Nothing active right now.</div></div>'; }
    else {
      html += '<div class="card">';
      inMotion.forEach(function(p){
        var st = STATUS[p.status] || {label:p.status,dot:"#71717a"};
        var due = dueLabel(p.deadline, p.status);
        html += '<div class="row">'+
          '<span class="dot" style="background:'+st.dot+'"></span>'+
          '<span class="name">'+esc(p.name)+'</span>'+
          '<span class="meta">'+
            (p.priority==="high"?'<span class="high">High</span>':'')+
            '<span class="tag">'+esc(st.label)+'</span>'+
            (due?'<span class="due '+due.cls+'">'+esc(due.text)+'</span>':'')+
          '</span>'+
        '</div>';
      });
      html += '</div>';
    }
    html += '</section>';

    // checklist (view + add only)
    var tKey = todayKey();
    html += '<section><h2>'+iconSvg("check")+'Daily checklist</h2><div class="card">';
    if(!checklist.length){ html += '<div class="empty">No checklist items yet.</div>'; }
    else {
      checklist.forEach(function(it){
        var done = it.doneOn === tKey;
        html += '<div class="chk'+(done?" done":"")+'">'+
          '<span class="box"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>'+
          '<span class="txt">'+esc(it.text)+'</span>'+
        '</div>';
      });
    }
    html += '<div class="addbar"><input id="chkInput" type="text" placeholder="Add a checklist item for today…" maxlength="200" />'+
            '<button id="chkAdd" type="button">Add</button></div>';
    html += '</div><div id="msg"></div>'+
            '<p class="note">Adding an item writes only to the checklist — it appears on the dashboard on its next refresh. You can\u2019t edit or remove anything else from here.</p>';
    html += '</section>';

    document.getElementById("content").innerHTML = html;
    msgEl = document.getElementById("msg");
    wireAdd();
    updatedEl.textContent = "updated " + fmtWhen(Date.now());
  }

  function statCard(k,v,cls){
    var zero = (v===0 || v==="0h") ? " zero" : "";
    return '<div class="stat'+(cls?" "+cls:"")+'"><div class="k">'+esc(k)+'</div><div class="v'+zero+'">'+esc(v)+'</div></div>';
  }
  function iconSvg(kind){
    var p = { cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
              play:'<circle cx="12" cy="12" r="9"/><polygon points="10 8 16 12 10 16 10 8"/>',
              check:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>' }[kind]||"";
    return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';
  }
  function weekStrip(weekPicks, monday, allProjects){
    var byId={}; allProjects.forEach(function(p){ byId[p.id]=p; });
    var labels=["Mon","Tue","Wed","Thu","Fri"];
    var hasPlan = weekPicks && weekPicks.week === mondayKey(monday) && weekPicks.picks;
    var todayStr = midnight(new Date()).toDateString();
    var out = '<div class="week">';
    for(var i=0;i<5;i++){
      var d=new Date(monday); d.setDate(monday.getDate()+i);
      var isToday = d.toDateString()===todayStr;
      out += '<div class="day'+(isToday?" today":"")+'"><div class="dl"><span>'+labels[i]+'</span><span>'+d.getDate()+'</span></div>';
      var picks = hasPlan ? arr(weekPicks.picks[i]) : [];
      if(!picks.length){ out += '<div class="none">'+(hasPlan?"—":"")+'</div>'; }
      else {
        picks.forEach(function(x){
          var p=byId[x.id]; if(!p) return;
          var h=Number(x.hours)||0;
          out += '<div class="it"><span>'+esc(p.name)+'</span>'+(h?'<span class="h">'+h+'h</span>':'')+'</div>';
        });
      }
      out += '</div>';
    }
    out += '</div>';
    if(!hasPlan) out += '<p class="note">No plan set for the current week yet.</p>';
    return out;
  }

  function wireAdd(){
    var input = document.getElementById("chkInput");
    var btn = document.getElementById("chkAdd");
    if(!input || !btn) return;
    async function go(){
      var t = (input.value||"").trim();
      if(!t){ return; }
      btn.disabled = true; setMsg("Adding…", null);
      var ok = await addChecklistItem(t);
      btn.disabled = false;
      if(ok){ input.value=""; setMsg("Added to the checklist.", "ok"); load(true); }
      else { setMsg("Couldn't add — try again.", "err"); }
    }
    btn.addEventListener("click", go);
    input.addEventListener("keydown", function(e){ if(e.key==="Enter") go(); });
  }

  async function load(silent){
    if(!silent) document.getElementById("content").innerHTML = '<div class="loading">Loading…</div>';
    try { var snap = await getSnapshot(); render(snap); }
    catch(e){ document.getElementById("content").innerHTML = '<div class="loading">Couldn\u2019t load data. <br/><br/>'+
      'If this keeps happening, the data endpoint may be unreachable.</div>'; }
  }

  document.addEventListener("DOMContentLoaded", function(){
    updatedEl = document.getElementById("updated");
    document.getElementById("refreshBtn").addEventListener("click", function(){ load(false); });
    load(false);
    setInterval(function(){ load(true); }, POLL_MS);
  });
})();
</script>
</body>
</html>
